version: "3.9"

services:
  db:
    image: postgres:17
    container_name: ajaisikam_db

    restart: always

    environment:
      POSTGRES_DB: ajaisikam-db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: django_backend

    command: python manage.py runserver 0.0.0.0:8000

    volumes:
      - ./backend:/app

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env.production

    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: react_frontend

    volumes:
      - ./frontend:/app
      - /app/node_modules

    ports:
      - "5173:5173"

    env_file:
      - ./frontend/.env.development

    depends_on:
      - backend

volumes:
  postgres_data: